kind = "web"
previewPath = "/"
title = "BougieBams Community"
version = "1.0.0"
id = "artifacts/bougiebams-community"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18987

[services.development]
run = "pnpm --filter @workspace/bougiebams-community run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bougiebams-community", "run", "build" ]
publicDir = "artifacts/bougiebams-community/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18987"
BASE_PATH = "/"
